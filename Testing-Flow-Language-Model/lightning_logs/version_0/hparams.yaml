config:
  algo:
    T: 0
    backbone: dit
    causal_attention: false
    double_temb: false
    ignore_bos: false
    learnable_loss_weighting: false
    name: flm
    parameterization: mean
    prefix_training: true
    subs_masking: false
    t_max: 1.0
    t_min: 1.0e-05
    time_conditioning: true
  checkpointing:
    resume_from_ckpt: false
    save_dir: outputs/13_04_2026_Version_1
  eval:
    checkpoint_path: pretrained_weights/checkpoints/lm1b_flm.ckpt
    compute_generative_perplexity: false
    disable_ema: false
    gen_ppl_eval_model_name_or_path: gpt2
    generate_samples: true
    perplexity_batch_size: 1
  loader:
    batch_size: 16
    eval_batch_size: 4
    global_batch_size: 64
    num_workers: 4
    pin_memory: true
  lr_scheduler:
    _target_: transformers.get_cosine_schedule_with_warmup
    num_training_steps: 1000
    num_warmup_steps: 100
  model:
    cond_dim: 128
    dropout: 0.1
    hidden_size: 768
    length: 256
    n_blocks: 12
    n_heads: 12
    scale_by_sigma: true
    tie_word_embeddings: false
    vocab_lookup: true
  optim:
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-08
    lr: 5.0e-05
    weight_decay: 0.01
  sampling:
    num_sample_batches: 1
    num_sample_log: 1
    p_nucleus: 1.0
    predictor: euler
    steps: 50
  training:
    accumulate_grad_batches: 4
    antithetic_sampling: true
    ema: 0.999
    not_sampling_t: false
    sampling_eps: 1.0e-05
